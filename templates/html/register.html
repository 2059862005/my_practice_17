<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Django REST Framework JWT</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
        }
        
        .login-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group label .required {
            color: #e74c3c;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group input.error {
            border-color: #e74c3c;
        }
        
        .form-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .code-input-group {
            display: flex;
            gap: 10px;
        }
        
        .code-input-group input {
            flex: 1;
        }
        
        .btn-get-code {
            padding: 12px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            transition: opacity 0.3s;
        }
        
        .btn-get-code:hover:not(:disabled) {
            opacity: 0.9;
        }
        
        .btn-get-code:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .password-strength {
            margin-top: 8px;
        }
        
        .strength-bar {
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .strength-bar-fill {
            height: 100%;
            width: 0;
            transition: width 0.3s, background 0.3s;
        }
        
        .strength-text {
            font-size: 12px;
            margin-top: 5px;
            color: #999;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s, opacity 0.3s;
        }
        
        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .terms input {
            width: auto;
            margin-top: 3px;
        }
        
        .terms a {
            color: #667eea;
        }
        
        .links {
            text-align: center;
            margin-top: 25px;
        }
        
        .links p {
            margin: 8px 0;
            color: #666;
        }
        
        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .error-message {
            background: #fee;
            color: #e74c3c;
            border: 1px solid #fcc;
        }
        
        .success-message {
            background: #efe;
            color: #27ae60;
            border: 1px solid #cfc;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-container">
            <h1 class="login-title">用户注册</h1>
            
            <div id="error" class="message error-message"></div>
            <div id="success" class="message success-message"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名 <span class="required"></span>*</span></label>
                    <input type="text" id="username" name="username" required placeholder="请输入用户名（3-20个字符）" minlength="3" maxlength="20" autocomplete="username">
                    <p class="form-hint">只能包含字母、数字和下划线</p>
                </div>
                
                <div class="form-group">
                    <label for="email">邮箱地址 <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="请输入邮箱地址" autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="verification_code">邮箱验证码 <span class="required">*</span></label>
                    <div class="code-input-group">
                        <input type="text" id="verification_code" name="code" required placeholder="请输入6位验证码" maxlength="6" autocomplete="off">
                        <button type="button" id="get_verification_code" class="btn-get-code">获取验证码</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">密码 <span class="required">*</span></label>
                    <input type="password" id="password" name="password" required placeholder="请输入密码（至少8位）" minlength="8" autocomplete="new-password">
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-bar-fill" id="strength-bar"></div>
                        </div>
                        <p class="strength-text" id="strength-text"></p>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password_confirm">确认密码 <span class="required">*</span></label>
                    <input type="password" id="password_confirm" name="password_confirm" required placeholder="请再次输入密码" minlength="8" autocomplete="new-password">
                </div>
                
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">我已阅读并同意 <a href="/terms/">服务条款</a> 和 <a href="/privacy/">隐私政策</a></label>
                </div>
                
                <button type="submit" class="btn-login">注 册</button>
            </form>
            
            <div class="links">
                <p>已有账号？<a href="/login/">立即登录</a></p>
                <p><a href="/">返回首页</a></p>
            </div>
        </div>
    </div>
    
    <script src="{% static 'auth.js' %}"></script>
    <script>
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');
        
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            let text = '';
            let color = '#eee';
            
            if (password.length >= 8) strength += 1;
            if (password.length >= 12) strength += 1;
            if (/[a-z]/.test(password)) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 1;
            
            switch(strength) {
                case 0:
                case 1:
                    text = '密码强度：弱';
                    color = '#e74c3c';
                    break;
                case 2:
                case 3:
                    text = '密码强度：中等';
                    color = '#f39c12';
                    break;
                case 4:
                case 5:
                    text = '密码强度：强';
                    color = '#27ae60';
                    break;
                case 6:
                    text = '密码强度：非常强';
                    color = '#27ae60';
                    break;
            }
            
            const width = Math.min(100, (strength / 6) * 100);
            strengthBar.style.width = width + '%';
            strengthBar.style.background = color;
            strengthText.textContent = text;
            strengthText.style.color = color;
        });
        
        document.getElementById('get_verification_code').addEventListener('click', async function() {
            const email = document.getElementById('email').value.trim();
            const btn = this;
            
            if (!email) {
                showError('请输入邮箱地址');
                return;
            }
            
            if (!validateEmail(email)) {
                showError('请输入有效的邮箱地址');
                return;
            }
            
            btn.disabled = true;
            let countdown = 60;
            
            try {
                const response = await fetch('/api/auth/send_code/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken()
                    },
                    body: JSON.stringify({ email, type: 'register' })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('验证码已发送到您的邮箱');
                    const timer = setInterval(() => {
                        countdown--;
                        btn.textContent = `${countdown}秒后重发`;
                        if (countdown <= 0) {
                            clearInterval(timer);
                            btn.disabled = false;
                            btn.textContent = '获取验证码';
                        }
                    }, 1000);
                } else {
                    showError(data.error || '发送失败');
                    btn.disabled = false;
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                btn.disabled = false;
            }
        });
        
        document.getElementById('username').addEventListener('input', function() {
            this.value = this.value.replace(/[^a-zA-Z0-9_]/g, '');
        });
        
        document.getElementById('email').addEventListener('input', function() {
            this.value = this.value.trim();
        });
        
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const code = document.getElementById('verification_code').value.trim();
            const password = document.getElementById('password').value;
            const password_confirm = document.getElementById('password_confirm').value;
            const submitBtn = this.querySelector('button[type="submit"]');
            
            if (!username || !email || !code || !password || !password_confirm) {
                showError('请填写所有必填字段');
                return;
            }
            
            if (password !== password_confirm) {
                showError('两次密码不一致');
                return;
            }
            
            setLoading(submitBtn, true);
            
            try {
                const response = await fetch('/api/auth/register/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken()
                    },
                    body: JSON.stringify({ username, email, code, password, password_confirm })
                });
                
                const data = await response.json();
                
                if (response.ok || response.status === 201) {
                    showSuccess('注册成功！正在跳转到登录页...');
                    setTimeout(() => {
                        window.location.href = '/login/';
                    }, 1500);
                } else {
                    showError(data.error || '注册失败');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
            } finally {
                setLoading(submitBtn, false);
            }
        });
    </script>
</body>

</html>
